services:
  postgres:
    image: postgres:16
    container_name: glopick-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: glopick
      POSTGRES_PASSWORD: glopick1234
      POSTGRES_DB: glopick
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: